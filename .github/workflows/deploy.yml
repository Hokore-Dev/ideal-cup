name: Deploy to GitHub Pages

on:
  # main 브랜치에 푸시할 때마다 자동 배포
  push:
    branches: ["main"]
  # 액션 탭에서 수동 실행도 가능
  workflow_dispatch:

# GITHUB_TOKEN 권한 설정 (Pages 배포에 필요)
permissions:
  contents: read
  pages: write
  id-token: write

# 동시 배포 방지: 진행 중인 배포가 있으면 새 푸시는 대기
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # 레포 루트 전체를 그대로 업로드 (빌드 과정 없음)
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
